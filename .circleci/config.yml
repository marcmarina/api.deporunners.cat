version: 2.1
orbs:
  node: circleci/node@3.0.0

jobs:
  unit-testing: 
    docker:       
      - image: circleci/node      
    steps:
      - checkout
      - run: yarn
      - run: yarn test

  docker-build:
    environment:
        IMAGE_NAME: marcmarina/docker-deporunners
    docker:
      - image: circleci/buildpack-deps:stretch
    steps:
      - checkout
      - setup_remote_docker
      - run:
          name: Build Docker image
          command: docker build -t $IMAGE_NAME:latest
  publish-latest:
    environment:
      IMAGE_NAME: docker-deporunners
    docker:
      - image: circleci/buildpack-deps:stretch
    steps:
      - setup_remote_docker
      - run:
          name: Publish Docker Image to Docker Hub
          command: |
            echo "$DOCKERHUB_PASS" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            docker push $IMAGE_NAME:latest

workflows:
  testing:
    jobs:
      - unit-testing:
        filters: 
          branches:
            only: /*/
  publish-latest-docker:
    jobs:
      - docker-build:
          filters:
            branches:
              only: docker
      - publish-latest:
          requires:
            - docker-build
          filters:
            branches:
              only: docker
