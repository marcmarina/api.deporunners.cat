version: 2.1
orbs:
  node: circleci/node@3.0.0

executors:
  docker-publisher:
    environment:
      IMAGE_NAME: marcmarina/docker-deporunners
    docker:
      - image: circleci/buildpack-deps:stretch

jobs:
  unit-testing: 
    docker:       
      - image: circleci/node      
    steps:
      - checkout
      - run: yarn
      - run: yarn test

  docker-build:
    executor: docker-publisher
    steps:
      - checkout
      - setup_remote_docker:
          version: 19.03.13
      - run:
          name: Build Docker image
          command: docker build . -t $IMAGE_NAME:latest
      - run:
          name: Archive Docker image
          command: docker save -o image.tar $IMAGE_NAME
      - persist_to_workspace:
          root: .
          paths:
            - ./image.tar

  publish-latest:
    executor: docker-publisher
    steps:
      - attach_workspace:
          at: /tmp/workspace
      - setup_remote_docker:
          version: 19.03.13
      - run:
          name: Load archived Docker image
          command: docker load -i /tmp/workspace/image.tar
      - run:
          name: Publish Docker Image to Docker Hub
          command: |
            docker login -u $DOCKERHUB_USERNAME -p $DOCKERHUB_PASSWORD
            docker push $IMAGE_NAME:latest

workflows:
  testing:
    jobs:
      - unit-testing:
        filters: 
          branches:
            only: /*/
  publish-latest-docker:
    jobs:
      - docker-build:
          filters:
            branches:
              only: docker
      - publish-latest:
          requires:
            - docker-build
          filters:
            branches:
              only: docker
          context:
            - Docker
